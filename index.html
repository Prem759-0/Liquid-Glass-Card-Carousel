<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Cinematic Flip Carousel</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #060612;
      height: 100vh; width: 100vw;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      align-items: center; justify-content: center;
      cursor: none; /* custom cursor */
      user-select: none;
      touch-action: pan-y;
      transition: background 0.8s ease;
      position: relative;
    }
    body.dragging { cursor: none; }
    body.expanded { overflow: hidden; }

    /* Custom cursor orb */
    .cursor-orb {
      position: fixed;
      width: 30px; height: 30px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(167,139,250,0.9), transparent);
      pointer-events: none;
      z-index: 999;
      mix-blend-mode: screen;
      transform: translate(-50%, -50%);
      transition: width 0.2s, height 0.2s, background 0.3s;
      box-shadow: 0 0 30px rgba(167,139,250,0.7);
      will-change: transform;
    }
    .cursor-trail {
      position: fixed;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.8);
      pointer-events: none;
      z-index: 998;
      transform: translate(-50%, -50%);
      opacity: 0.6;
      will-change: transform;
      transition: opacity 0.2s;
    }

    canvas#particles {
      position: fixed; top:0; left:0;
      width:100%; height:100%;
      z-index:0; pointer-events: none;
    }

    .carousel-wrapper {
      position: relative; z-index:2;
      perspective: 1400px;
      width: 90vw; max-width: 700px;
      height: 440px;
      display: flex;
      align-items: center; justify-content: center;
      transition: filter 0.3s;
    }
    body.expanded .carousel-wrapper {
      filter: blur(12px) brightness(0.5);
      pointer-events: none;
    }

    .carousel {
      position: absolute; left:50%; top:50%;
      transform-style: preserve-3d;
      will-change: transform;
      transition: transform 0.08s ease-out;
    }

    .card {
      position: absolute;
      width: 230px; height: 310px;
      margin-left: -115px; margin-top: -155px;
      border-radius: 2.2rem;
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: 0 25px 45px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.2);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: white; font-size: 0.9rem;
      transform-style: preserve-3d;
      will-change: transform, filter, opacity;
      transition: filter 0.2s, border-color 0.3s, box-shadow 0.3s, transform 0.1s ease;
      cursor: pointer;
      overflow: hidden;
      -webkit-box-reflect: below 8px linear-gradient(transparent, rgba(255,255,255,0.1));
    }
    /* Flip inner */
    .card-inner {
      position: absolute;
      width:100%; height:100%;
      transform-style: preserve-3d;
      transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: inherit;
    }
    .card.flipped .card-inner { transform: rotateY(180deg); }
    .card-front, .card-back {
      position: absolute;
      width:100%; height:100%;
      backface-visibility: hidden;
      border-radius: inherit;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 1.5rem;
      box-sizing: border-box;
    }
    .card-back {
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(30px);
      transform: rotateY(180deg);
      text-align: center;
    }
    .card-back h3 { font-weight:500; margin-bottom:0.8rem; }
    .card-back p { opacity:0.9; font-size:0.9rem; line-height:1.5; }

    .card::after {
      content: '';
      position: absolute;
      bottom: -45px; left:0;
      width:100%; height:60px;
      background: linear-gradient(to bottom, rgba(255,255,255,0.1), transparent);
      transform: scaleY(-1) translateY(-10px);
      opacity: 0.2;
      filter: blur(6px);
      pointer-events: none;
      border-radius: 50%;
      transition: opacity 0.3s;
    }
    .card.hover-lift::after { opacity: 0.5; }

    .card.active {
      border-color: rgba(255,255,255,0.5);
      box-shadow: 0 30px 60px rgba(120,80,255,0.5), inset 0 1px 0 rgba(255,255,255,0.3);
    }
    .card.hover-lift {
      transform: scale(1.08) translateZ(-10px);
      box-shadow: 0 40px 70px rgba(120,80,255,0.6);
      border-color: rgba(255,255,255,0.6);
    }

    .card.expanded {
      position: fixed;
      width: 85vw; max-width: 380px;
      height: 500px;
      left:50%; top:50%;
      margin:0;
      transform: translate(-50%, -50%) !important;
      z-index:100;
      transition: transform 0.5s cubic-bezier(0.2,0.9,0.3,1), border-radius 0.4s;
      border-radius: 2.5rem;
      box-shadow: 0 0 120px rgba(120,80,255,0.7);
      background: rgba(10,10,35,0.95);
    }
    .card.expanded .card-inner { transform: none; }
    .card.expanded .card-back { display: none; }
    .card.expanded .detail { display: block; }

    .detail { display: none; margin-top:1rem; font-size:0.85rem; opacity:0.9; text-align:center; }

    .backdrop {
      position: fixed; top:0; left:0; width:100%; height:100%;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(12px);
      z-index:99; opacity:0; pointer-events:none;
      transition: opacity 0.3s;
    }
    body.expanded .backdrop { opacity:1; pointer-events:auto; }

    /* HUD */
    .hud {
      position: fixed; top:1.5rem; left:50%; transform:translateX(-50%);
      display: flex; gap:1rem; align-items:center;
      background: rgba(15,15,35,0.65);
      backdrop-filter: blur(20px);
      border:1px solid rgba(255,255,255,0.15);
      border-radius: 3rem;
      padding: 0.6rem 1.5rem;
      z-index: 50;
      color: white; font-size:0.9rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      transition: background 0.3s;
    }
    .hud-item {
      cursor: pointer; opacity:0.8; transition: opacity 0.2s;
      display: flex; align-items:center; gap:0.3rem;
    }
    .hud-item:hover { opacity:1; }
    .hud-item.active { color:#a78bfa; }
    .theme-dots { display:flex; gap:0.6rem; }
    .theme-dot {
      width:14px; height:14px; border-radius:50%;
      border:2px solid transparent; cursor:pointer; transition: border-color 0.2s;
    }
    .theme-dot.selected { border-color: white; }

    .progress-dots {
      position: fixed; bottom:2rem; left:50%; transform:translateX(-50%);
      display: flex; gap:0.75rem; z-index:5;
      pointer-events: none;
    }
    .dot {
      width:8px; height:8px; border-radius:50%;
      background: rgba(255,255,255,0.25);
      transition: all 0.3s;
    }
    .dot.active { background:#a78bfa; box-shadow:0 0 14px #a78bfa; transform:scale(1.5); }

    @media (max-width:600px) {
      .hud { font-size:0.8rem; padding:0.4rem 1rem; }
    }
  </style>
</head>
<body>
  <canvas id="particles"></canvas>
  <div class="cursor-orb" id="cursorOrb"></div>
  <div class="cursor-trail" id="cursorTrail"></div>

  <div class="hud" id="hud">
    <span id="clock">12:00</span>
    <div class="theme-dots" id="themeDots">
      <span class="theme-dot selected" data-theme="neon" style="background:#a78bfa;"></span>
      <span class="theme-dot" data-theme="ocean" style="background:#38bdf8;"></span>
      <span class="theme-dot" data-theme="sunset" style="background:#fb923c;"></span>
      <span class="theme-dot" data-theme="matrix" style="background:#4ade80;"></span>
    </div>
    <span class="hud-item" id="micBtn">🎤</span>
    <span class="hud-item" id="autoPlayToggle">⏯️</span>
    <span class="hud-item" id="soundToggle">🔊</span>
  </div>

  <div class="carousel-wrapper">
    <div class="carousel" id="carousel"></div>
  </div>

  <div class="backdrop" id="backdrop"></div>
  <div class="progress-dots" id="dotsContainer"></div>

  <script>
    // ────────────────── DOM ELEMENTS ──────────────────
    const carouselEl = document.getElementById('carousel');
    const backdrop = document.getElementById('backdrop');
    const dotsContainer = document.getElementById('dotsContainer');
    const body = document.body;
    const cursorOrb = document.getElementById('cursorOrb');
    const cursorTrail = document.getElementById('cursorTrail');
    const clockEl = document.getElementById('clock');
    const micBtn = document.getElementById('micBtn');
    const autoPlayToggle = document.getElementById('autoPlayToggle');
    const soundToggleBtn = document.getElementById('soundToggle');

    // ────────────────── THEME DATA ──────────────────
    const themes = {
      neon: { primary:'#a78bfa', secondary:'#f472b6', particleHue:260 },
      ocean: { primary:'#38bdf8', secondary:'#2dd4bf', particleHue:190 },
      sunset: { primary:'#fb923c', secondary:'#fbbf24', particleHue:30 },
      matrix: { primary:'#4ade80', secondary:'#a3e635', particleHue:120 }
    };
    let currentTheme = 'neon';

    // ────────────────── CARDS SETUP ──────────────────
    const cardCount = 8;
    const cardWidth = 230, cardGap = 40;
    const totalCardSpace = cardWidth + cardGap;
    const centerIndex = Math.floor(cardCount/2);

    const colors = [
      ['#a78bfa','#f472b6'],['#38bdf8','#2dd4bf'],
      ['#fb923c','#fbbf24'],['#4ade80','#a3e635'],
      ['#f87171','#fb7185'],['#c084fc','#e879f9'],
      ['#60a5fa','#818cf8'],['#34d399','#6ee7b7']
    ];
    const categories = ['Design','Code','Photo','Music','AI','Games','Space','Art'];
    const details = [
      'Create beautiful interfaces that delight users.',
      'Clean architecture, scalable solutions.',
      'Capture stories through light.',
      'Soundtracks for the soul.',
      'Intelligent systems, human touch.',
      'Immersive experiences built.',
      'Explore the cosmos.',
      'Emotions on digital canvas.'
    ];
    const backDetails = [
      'Figma, Blender, CSS art',
      'React, Node, Python',
      'Lightroom, DaVinci',
      'Ableton, Logic, SP-404',
      'TensorFlow, PyTorch',
      'Unity, Unreal Engine',
      'Telescope, Stellarium',
      'Procreate, Illustrator'
    ];
    const icons = ['🎨','💻','📷','🎵','🤖','🎮','🌌','🎭'];

    const cardElements = [];
    let baseIndices = [];

    for (let i=0; i<cardCount; i++) {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="card-inner">
          <div class="card-front">
            <span style="font-size:3.2rem">${icons[i]}</span>
            <h2 style="background:linear-gradient(135deg, ${colors[i][0]}, ${colors[i][1]}); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">${categories[i]}</h2>
            <p>Premium glass</p>
            <div class="detail">${details[i]}</div>
          </div>
          <div class="card-back">
            <h3>${categories[i]}</h3>
            <p>${backDetails[i]}</p>
          </div>
        </div>
      `;
      carouselEl.appendChild(card);
      cardElements.push(card);
      baseIndices.push(i);
    }

    // ────────────────── PROGRESS DOTS ──────────────────
    const dots = [];
    for (let i=0; i<cardCount; i++) {
      const dot = document.createElement('div');
      dot.className = 'dot';
      dotsContainer.appendChild(dot);
      dots.push(dot);
    }

    // ────────────────── AUDIO ENGINE ──────────────────
    let audioCtx, analyser, dataArray;
    let micActive = false, soundEnabled = true;
    function initAudio() {
      if (audioCtx) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    async function enableMic() {
      initAudio();
      if (micActive) return;
      try {
        const stream = await navigator.mediaDevices.getUserMedia({audio:true});
        const source = audioCtx.createMediaStreamSource(stream);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        source.connect(analyser);
        dataArray = new Uint8Array(analyser.frequencyBinCount);
        micActive = true; micBtn.classList.add('active');
      } catch(e) {
        // oscillator fallback
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        const osc = audioCtx.createOscillator();
        osc.frequency.value = 220; osc.type='sine';
        osc.connect(analyser); osc.start();
        dataArray = new Uint8Array(analyser.frequencyBinCount);
        micActive = true; micBtn.classList.add('active');
      }
    }
    function getAudioLevel() {
      if (!micActive || !analyser) return 0;
      analyser.getByteFrequencyData(dataArray);
      let sum=0; for(let i=0;i<dataArray.length;i++) sum+=dataArray[i];
      return sum / dataArray.length / 255;
    }
    function playClick() {
      if (!audioCtx || !soundEnabled) return;
      const t = audioCtx.currentTime;
      const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
      osc.type='sine'; osc.frequency.setValueAtTime(800,t); osc.frequency.exponentialRampToValueAtTime(200,t+0.08);
      gain.gain.setValueAtTime(0.12,t); gain.gain.exponentialRampToValueAtTime(0.001,t+0.08);
      osc.connect(gain).connect(audioCtx.destination); osc.start(t); osc.stop(t+0.08);
    }
    function playSwipe(intensity=0.4) {
      if (!audioCtx||!soundEnabled) return;
      const t = audioCtx.currentTime;
      const noise = audioCtx.createBufferSource();
      const buf = audioCtx.createBuffer(1, audioCtx.sampleRate*0.12, audioCtx.sampleRate);
      const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(audioCtx.sampleRate*0.02));
      noise.buffer=buf;
      const gain=audioCtx.createGain(); gain.gain.setValueAtTime(intensity*0.12,t); gain.gain.exponentialRampToValueAtTime(0.001,t+0.12);
      const filter=audioCtx.createBiquadFilter(); filter.type='lowpass';filter.frequency.value=2000;
      noise.connect(filter).connect(gain).connect(audioCtx.destination); noise.start(t);noise.stop(t+0.12);
    }

    // ────────────────── STATE ──────────────────
    let virtualOffset=0, targetOffset=0, velocity=0;
    let isDragging=false, lastPointerX=0, lastTime=0;
    const friction=0.92, stiffness=0.08, damping=0.78;
    let idleTime=0, autoAdvanceDelay=4000, autoPlay=true;
    let mouseX=innerWidth/2, mouseY=innerHeight/2;
    let expandedCardIdx=-1, hoverCardIdx=-1;
    let lastSnappedVirtual=0;
    let flippedCards = new Set();

    // Gyro
    let gyroX=0,gyroY=0;
    window.addEventListener('deviceorientation', (e)=>{
      if(e.beta!=null){gyroY = e.gamma/90; gyroX = e.beta/90;}
    }, true);

    // ────────────────── INTERACTIONS ──────────────────
    function resetIdle() { idleTime=0; }
    body.addEventListener('pointerdown', (e)=>{
      initAudio();
      if(expandedCardIdx!==-1){ collapseCard(); return; }
      isDragging=true; lastPointerX=e.clientX; lastTime=performance.now();
      body.classList.add('dragging'); body.setPointerCapture(e.pointerId);
      resetIdle();
    });
    body.addEventListener('pointermove', (e)=>{
      mouseX=e.clientX; mouseY=e.clientY;
      if(!isDragging) return;
      const dx=e.clientX-lastPointerX, dt=Math.max(performance.now()-lastTime,1);
      virtualOffset+=dx; targetOffset=virtualOffset;
      velocity=dx/dt; lastPointerX=e.clientX; lastTime=performance.now();
      resetIdle();
      if(Math.abs(dx)>2) playSwipe(Math.min(Math.abs(dx)/30,1));
    });
    body.addEventListener('pointerup', ()=>{
      if(!isDragging) return;
      isDragging=false; body.classList.remove('dragging');
      const nearest=Math.round(virtualOffset/totalCardSpace)*totalCardSpace;
      targetOffset=nearest;
      if(Math.abs(nearest-virtualOffset)>1){ playClick(); if(navigator.vibrate) navigator.vibrate(10); }
      resetIdle();
    });
    window.addEventListener('wheel', (e)=>{
      e.preventDefault();
      if(expandedCardIdx!==-1) return;
      targetOffset-=e.deltaY*0.8; playSwipe(0.3); resetIdle();
    }, {passive:false});
    window.addEventListener('keydown',(e)=>{
      if(expandedCardIdx!==-1){ if(e.key==='Escape') collapseCard(); return; }
      if(e.key==='ArrowLeft'){ targetOffset-=totalCardSpace; resetIdle(); playClick(); }
      else if(e.key==='ArrowRight'){ targetOffset+=totalCardSpace; resetIdle(); playClick(); }
    });

    // Hover
    carouselEl.addEventListener('pointermove', (e)=>{
      if(isDragging||expandedCardIdx!==-1) return;
      const card = e.target.closest('.card');
      hoverCardIdx = card ? cardElements.indexOf(card) : -1;
    });
    carouselEl.addEventListener('pointerleave',()=>{ hoverCardIdx=-1; });

    // Double click flip
    carouselEl.addEventListener('dblclick', (e)=>{
      if(isDragging||expandedCardIdx!==-1) return;
      const card = e.target.closest('.card');
      if(!card) return;
      const idx = cardElements.indexOf(card);
      if(flippedCards.has(idx)) flippedCards.delete(idx); else flippedCards.add(idx);
      card.classList.toggle('flipped', flippedCards.has(idx));
      playClick(); if(navigator.vibrate) navigator.vibrate(15);
    });

    // Pinch expand (multi-touch)
    let lastPinchDist=0;
    window.addEventListener('touchstart', (e)=>{
      if(e.touches.length===2){
        lastPinchDist = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
      }
    });
    window.addEventListener('touchmove', (e)=>{
      if(e.touches.length===2 && expandedCardIdx===-1){
        const dist = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
        if(dist - lastPinchDist > 50){
          const centerX = (e.touches[0].clientX+e.touches[1].clientX)/2, centerY = (e.touches[0].clientY+e.touches[1].clientY)/2;
          const target = document.elementFromPoint(centerX, centerY)?.closest('.card');
          if(target){
            const idx = cardElements.indexOf(target);
            if(idx!==-1) expandCard(idx);
          }
          lastPinchDist=dist;
        }
      } else if(e.touches.length===2 && expandedCardIdx!==-1){
        const dist = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
        if(lastPinchDist - dist > 50) collapseCard();
      }
    });

    // ────────────────── CARD UPDATES ──────────────────
    function updateCards() {
      const activeVirtual = Math.round(targetOffset / totalCardSpace);
      cardElements.forEach((card, i) => {
        let virtIdx = baseIndices[i];
        let rawX = (virtIdx - centerIndex) * totalCardSpace + virtualOffset;

        if(rawX < -totalCardSpace*cardCount*0.7){ baseIndices[i]+=cardCount; virtIdx+=cardCount; rawX+=cardCount*totalCardSpace; }
        else if(rawX > totalCardSpace*cardCount*0.7){ baseIndices[i]-=cardCount; virtIdx-=cardCount; rawX-=cardCount*totalCardSpace; }

        const dist = Math.abs(rawX);
        const maxDist = totalCardSpace*2.5;
        const scale = Math.max(0.55, 1 - (dist/maxDist)*0.5);
        const z = -dist*0.8;
        const rotY = (rawX/(totalCardSpace*2))*18;
        const opacity = Math.max(0.2, 1 - dist/(maxDist*1.2));
        const blur = Math.min(dist/140, 3);

        card.style.filter = `blur(${blur}px)`;
        card.style.transform = `translateX(${rawX}px) translateZ(${z}px) rotateY(${rotY}deg) scale(${scale})`;
        card.style.opacity = opacity;
        card.style.zIndex = Math.round(100-dist);

        const isActive = (virtIdx === activeVirtual);
        card.classList.toggle('active', isActive && !card.classList.contains('expanded'));
      });

      // Hover lift
      cardElements.forEach((c,i) => c.classList.toggle('hover-lift', i===hoverCardIdx && !isDragging && expandedCardIdx===-1));

      // Progress dots
      const activeMod = ((activeVirtual%cardCount)+cardCount)%cardCount;
      dots.forEach((d,i)=> d.classList.toggle('active', i===activeMod));

      if(activeVirtual !== lastSnappedVirtual){ playClick(); lastSnappedVirtual=activeVirtual; if(navigator.vibrate) navigator.vibrate(10); }

      // Dynamic background from theme
      const theme = themes[currentTheme];
      body.style.background = `radial-gradient(ellipse at center, ${theme.primary}25, #060612 80%)`;
    }

    // ────────────────── CAROUSEL TILT (gyro + mouse) ────
    function updateTilt() {
      // blend gyro and mouse
      const useGyro = Math.abs(gyroX)>0.01 || Math.abs(gyroY)>0.01;
      const tiltX = useGyro ? gyroX*-12 : ((mouseY/innerHeight)-0.5)*-12;
      const tiltY = useGyro ? gyroY*16 : ((mouseX/innerWidth)-0.5)*16;
      carouselEl.style.transform = `translate(-50%,-50%) rotateX(${tiltX}deg) rotateY(${tiltY}deg)`;
    }

    // ────────────────── EXPAND/COLLAPSE ──────────────────
    function expandCard(idx){
      if(expandedCardIdx!==-1) return;
      expandedCardIdx=idx; cardElements[idx].classList.add('expanded');
      body.classList.add('expanded'); backdrop.style.opacity='1';
      body.style.cursor='default'; resetIdle();
      playClick(); if(navigator.vibrate) navigator.vibrate(20);
    }
    function collapseCard(){
      if(expandedCardIdx===-1) return;
      cardElements[expandedCardIdx].classList.remove('expanded');
      body.classList.remove('expanded'); backdrop.style.opacity='0';
      expandedCardIdx=-1; body.style.cursor='none';
      playClick();
    }
    backdrop.addEventListener('click', collapseCard);

    // ────────────────── AUTO-PLAY ──────────────────
    function autoPlayTick(dt){
      if(isDragging||expandedCardIdx!==-1||!autoPlay) return;
      idleTime+=dt;
      if(idleTime>autoAdvanceDelay){
        const snap=Math.round(targetOffset/totalCardSpace)*totalCardSpace;
        targetOffset=snap + (autoPlay?1:0)*totalCardSpace;
        idleTime=0;
      }
    }

    // ────────────────── HUD & THEMES ──────────────────
    function updateClock(){ const now=new Date(); clockEl.textContent=now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); }
    setInterval(updateClock,1000); updateClock();
    micBtn.addEventListener('click', enableMic);
    autoPlayToggle.addEventListener('click', ()=>{ autoPlay=!autoPlay; autoPlayToggle.classList.toggle('active', autoPlay); });
    autoPlayToggle.classList.add('active');
    soundToggleBtn.addEventListener('click', ()=>{
      initAudio(); soundEnabled=!soundEnabled;
      soundToggleBtn.textContent=soundEnabled?'🔊':'🔇'; soundToggleBtn.classList.toggle('muted',!soundEnabled);
    });
    document.getElementById('themeDots').addEventListener('click', (e)=>{
      const dot = e.target.closest('.theme-dot');
      if(!dot) return;
      currentTheme = dot.dataset.theme;
      document.querySelectorAll('.theme-dot').forEach(d=>d.classList.remove('selected'));
      dot.classList.add('selected');
    });

    // ────────────────── CUSTOM CURSOR TRAIL ──────────────────
    const trailPositions = [];
    const maxTrail = 12;
    function updateCursor(){
      cursorOrb.style.left = mouseX+'px';
      cursorOrb.style.top = mouseY+'px';
      trailPositions.push({x:mouseX, y:mouseY});
      if(trailPositions.length>maxTrail) trailPositions.shift();
      // draw trails via canvas later? We'll use a separate trail element (single) but that's not multi-trail, we'll just move it.
    }
    // We'll move the trail element to the oldest position
    function moveTrail(){
      if(trailPositions.length>0){
        const p = trailPositions[0];
        cursorTrail.style.left = p.x+'px';
        cursorTrail.style.top = p.y+'px';
        cursorTrail.style.opacity = 0.5;
      }
    }
    // Instead of multiple elements, we'll draw a few on canvas? We'll overlay particles canvas for cursor trail later? We'll keep single dot trail, fine.

    // ────────────────── PARTICLES & AUDIO WAVES ──────────────────
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let w, h;
    let particles = [];

    function resizeCanvas(){ w=innerWidth; h=innerHeight; canvas.width=w; canvas.height=h; }
    window.addEventListener('resize', resizeCanvas);
    function initParticles(){
      particles=[];
      const theme = themes[currentTheme];
      for(let i=0;i<130;i++){
        particles.push({
          x:Math.random()*w, y:Math.random()*h,
          vx:(Math.random()-0.5)*0.3, vy:(Math.random()-0.5)*0.3,
          radius:Math.random()*2+1,
          hue: theme.particleHue + Math.random()*30,
          baseHue: theme.particleHue
        });
      }
    }
    function drawParticles(){
      ctx.clearRect(0,0,w,h);
      // Audio reactivity
      const audioLevel = getAudioLevel();
      const waveStrength = audioLevel*30;

      // Attract particles toward carousel center with subtle force
      const cx = w/2, cy = h/2;
      for(let p of particles){
        const dx = cx - p.x, dy = cy - p.y;
        const dist = Math.sqrt(dx*dx+dy*dy)||1;
        const force = 0.00015;
        p.vx += (dx/dist)*force; p.vy += (dy/dist)*force;
        p.vx *= 0.999; p.vy *= 0.999;
        p.x += p.vx; p.y += p.vy;
        if(p.x<0)p.x=w; if(p.x>w)p.x=0;
        if(p.y<0)p.y=h; if(p.y>h)p.y=0;
      }

      // Draw connections with wave effect
      ctx.beginPath();
      ctx.strokeStyle = `rgba(167,139,250,${0.08+audioLevel*0.1})`;
      ctx.lineWidth = 0.6;
      const threshold = 110 + waveStrength;
      for(let i=0;i<particles.length;i++){
        for(let j=i+1;j<particles.length;j++){
          const dx=particles[i].x-particles[j].x, dy=particles[i].y-particles[j].y;
          if(Math.sqrt(dx*dx+dy*dy)<threshold){
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
          }
        }
      }
      ctx.stroke();

      // Draw particles (with glow)
      for(let p of particles){
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius+audioLevel*2, 0, Math.PI*2);
        ctx.fillStyle = `hsl(${p.baseHue}, 80%, 65%)`;
        ctx.shadowColor = `hsl(${p.baseHue}, 80%, 65%)`;
        ctx.shadowBlur = 8 + audioLevel*12;
        ctx.fill();
      }
      ctx.shadowBlur=0;

      // Draw cursor trail particles on canvas for better performance
      // We'll use trailPositions and draw small fading circles
      for(let i=0; i<trailPositions.length; i++){
        const t = trailPositions[i];
        const alpha = (i/trailPositions.length)*0.4;
        ctx.beginPath();
        ctx.arc(t.x, t.y, 4, 0, Math.PI*2);
        ctx.fillStyle = `rgba(255,255,255,${alpha})`;
        ctx.shadowBlur = 8;
        ctx.shadowColor = 'white';
        ctx.fill();
      }
      ctx.shadowBlur=0;

      requestAnimationFrame(drawParticles);
    }

    // ────────────────── ANIMATION LOOP ──────────────────
    let lastFrame = performance.now();
    function animate(now){
      const dt = now - lastFrame; lastFrame=now;
      autoPlayTick(dt);

      if(!isDragging){
        const diff = targetOffset - virtualOffset;
        if(Math.abs(diff)>0.1){
          velocity += diff * stiffness;
          velocity *= damping;
          virtualOffset += velocity;
        } else { virtualOffset=targetOffset; velocity=0; }
      }

      updateCards();
      updateTilt();
      updateCursor();
      moveTrail();
      requestAnimationFrame(animate);
    }

    // ────────────────── INIT ──────────────────
    resizeCanvas();
    initParticles();
    drawParticles();
    requestAnimationFrame(animate);
    // initial cursor hide (show on move)
    body.addEventListener('pointermove', ()=>{ cursorOrb.style.opacity='1'; if(cursorTrail) cursorTrail.style.opacity='0.5'; });
    body.addEventListener('pointerleave', ()=>{ cursorOrb.style.opacity='0'; cursorTrail.style.opacity='0'; });
    lastSnappedVirtual = Math.round(virtualOffset/totalCardSpace);
  </script>
</body>
</html>
