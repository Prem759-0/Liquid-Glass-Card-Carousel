<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Liquid Glass Carousel</title>
  <style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a14;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: grab;
    user-select: none;
    touch-action: pan-y; /* allow vertical only for native gestures */
  }
  body.dragging { cursor: grabbing; }

  canvas#particles {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  .carousel-wrapper {
    position: relative;
    z-index: 2;
    perspective: 1200px;
    width: 90vw;
    max-width: 700px;
    height: 400px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .carousel {
    display: flex;
    gap: 0;
    position: absolute;
    left: 50%;
    top: 50%;
    transform-style: preserve-3d;
    will-change: transform;
  }

  .card {
    position: absolute;
    width: 220px;
    height: 300px;
    left: 50%; top: 50%;
    margin-left: -110px;
    margin-top: -150px;
    border-radius: 2rem;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,0.15);
    box-shadow: 0 30px 50px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.2);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 0.9rem;
    transition: border-color 0.3s;
    transform-style: preserve-3d;
    will-change: transform;
  }
  .card h2 {
    font-weight: 500;
    font-size: 2rem;
    margin: 0;
    background: linear-gradient(135deg, #c084fc, #60a5fa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .card p {
    opacity: 0.7;
    margin-top: 0.5rem;
  }

  /* Glare overlay */
  .glare {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 10;
    background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.15) 0%, transparent 60%);
    mix-blend-mode: overlay;
    opacity: 0;
    transition: opacity 0.2s;
  }
</style>
</head>
<body>
  <canvas id="particles"></canvas>
  <div class="carousel-wrapper">
    <div class="carousel" id="carousel"></div>
  </div>
  <!-- Glare overlay (moves with cursor) -->
  <div class="glare" id="glare"></div>
</body>
</html>
