<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Liquid Glass Carousel Pro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a14;
      height: 100vh; width: 100vw;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      align-items: center; justify-content: center;
      cursor: grab;
      user-select: none;
      touch-action: pan-y;
    }
    body.dragging { cursor: grabbing; }

    canvas#particles {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0; pointer-events: none;
    }

    .carousel-wrapper {
      position: relative; z-index: 2;
      perspective: 1200px;
      width: 90vw; max-width: 700px;
      height: 400px;
      display: flex;
      align-items: center; justify-content: center;
    }

    .carousel {
      position: absolute; left: 50%; top: 50%;
      transform-style: preserve-3d;
      will-change: transform;
      transition: transform 0.1s ease-out; /* smooth tilt */
    }

    .card {
      position: absolute;
      width: 220px; height: 300px;
      left: 50%; top: 50%;
      margin-left: -110px; margin-top: -150px;
      border-radius: 2rem;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.15);
      box-shadow: 0 30px 50px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.2);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: white; font-size: 0.9rem;
      transform-style: preserve-3d;
      will-change: transform, filter, opacity;
      transition: filter 0.2s, border-color 0.3s;
      overflow: hidden;
    }

    /* Pseudo‑element shine that moves with cursor */
    .card::before {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: inherit;
      background: radial-gradient(circle at var(--shine-x, 50%) var(--shine-y, 50%), rgba(255,255,255,0.25) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      z-index: 2;
      mix-blend-mode: overlay;
    }
    .card.shine::before { opacity: 1; }

    .card h2 {
      font-weight: 500; font-size: 2rem; margin: 0;
      background: linear-gradient(135deg, var(--g1, #c084fc), var(--g2, #60a5fa));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .card p { opacity: 0.7; margin-top: 0.5rem; }

    /* Active card glow */
    .card.active {
      border-color: rgba(255,255,255,0.45);
      box-shadow: 0 30px 55px rgba(120, 80, 255, 0.4), inset 0 1px 0 rgba(255,255,255,0.3);
    }

    /* Global glare overlay (still present for ambient light) */
    .glare {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 10;
      background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.1) 0%, transparent 60%);
      mix-blend-mode: overlay; opacity: 0;
      transition: opacity 0.3s;
    }

    /* Progress dots */
    .progress-dots {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 0.75rem;
      z-index: 5;
      pointer-events: none;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.25);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .dot.active {
      background: #a78bfa;
      box-shadow: 0 0 12px #a78bfa;
      transform: scale(1.4);
    }
  </style>
</head>
<body>
  <canvas id="particles"></canvas>
  <div class="carousel-wrapper">
    <div class="carousel" id="carousel"></div>
  </div>
  <div class="glare" id="glare"></div>
  <div class="progress-dots" id="dotsContainer"></div>

  <script>
    // ────────────────────────────────── DOM ──────────────────────────────────
    const carousel = document.getElementById('carousel');
    const glare = document.getElementById('glare');
    const dotsContainer = document.getElementById('dotsContainer');
    const body = document.body;

    // ────────────────────────────────── CARDS SETUP ──────────────────────────
    const cardCount = 8;
    const cardWidth = 220;
    const cardGap = 40;
    const totalCardSpace = cardWidth + cardGap;
    const centerIndex = Math.floor(cardCount / 2);

    const colors = [
      ['#a78bfa','#f472b6'], ['#38bdf8','#2dd4bf'],
      ['#fb923c','#fbbf24'], ['#4ade80','#a3e635'],
      ['#f87171','#fb7185'], ['#c084fc','#e879f9'],
      ['#60a5fa','#818cf8'], ['#34d399','#6ee7b7']
    ];

    const cardElements = [];

    for (let i = 0; i < cardCount; i++) {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <span style="font-size:3rem">${['🎨','🚀','🌈','💎','🔮','🎵','✨','🪐'][i]}</span>
        <h2>Card ${i+1}</h2>
        <p>Premium glass</p>
      `;
      card.style.setProperty('--g1', colors[i][0]);
      card.style.setProperty('--g2', colors[i][1]);
      carousel.appendChild(card);
      cardElements.push(card);
    }

    // ────────────────────────────────── PROGRESS DOTS ────────────────────────
    const dots = [];
    for (let i = 0; i < cardCount; i++) {
      const dot = document.createElement('div');
      dot.className = 'dot';
      dotsContainer.appendChild(dot);
      dots.push(dot);
    }

    // ────────────────────────────────── STATE ───────────────────────────────
    let xOffset = 0;               // current visual offset
    let targetOffset = 0;          // destination (snap / auto‑advance)
    let velocity = 0;
    let isDragging = false;
    let lastPointerX = 0;
    let lastTime = 0;
    const friction = 0.92;
    const springStiffness = 0.08;
    const springDamping = 0.78;

    let idleTime = 0;              // ms since last interaction
    const autoAdvanceDelay = 3500; // ms before auto‑next
    let autoPlayDirection = 1;     // 1 = forward, -1 = backward

    // Mouse position for tilt & per‑card shine
    let mouseScreenX = window.innerWidth / 2;
    let mouseScreenY = window.innerHeight / 2;

    // ────────────────────────────────── INTERACTION ──────────────────────────
    function resetIdle() {
      idleTime = 0;
    }

    body.addEventListener('pointerdown', (e) => {
      isDragging = true;
      lastPointerX = e.clientX;
      lastTime = performance.now();
      body.classList.add('dragging');
      body.setPointerCapture(e.pointerId);
      resetIdle();
    });

    body.addEventListener('pointermove', (e) => {
      mouseScreenX = e.clientX;
      mouseScreenY = e.clientY;
      if (!isDragging) return;
      const currentX = e.clientX;
      const currentTime = performance.now();
      const deltaX = currentX - lastPointerX;
      const deltaTime = Math.max(currentTime - lastTime, 1);
      xOffset += deltaX;
      targetOffset = xOffset;           // while dragging, follow freely
      velocity = deltaX / deltaTime;
      lastPointerX = currentX;
      lastTime = currentTime;
      resetIdle();
    });

    body.addEventListener('pointerup', () => {
      if (!isDragging) return;
      isDragging = false;
      body.classList.remove('dragging');
      // Snap to nearest card
      const nearest = Math.round(xOffset / totalCardSpace) * totalCardSpace;
      targetOffset = nearest;
      resetIdle();
    });

    // Mouse wheel / trackpad
    window.addEventListener('wheel', (e) => {
      e.preventDefault();
      const scrollSensitivity = 0.8;
      targetOffset -= e.deltaY * scrollSensitivity;
      // Clamp soft limit (prevent infinite scroll, we'll wrap later if desired)
      resetIdle();
    }, { passive: false });

    // ────────────────────────────────── CARD UPDATE ──────────────────────────
    function updateCards() {
      // Calculate active card index from targetOffset (for progress dots)
      const rawIndex = Math.round(targetOffset / totalCardSpace);
      const activeIndex = ((rawIndex % cardCount) + cardCount) % cardCount; // allow wrapping

      cardElements.forEach((card, index) => {
        const baseX = (index - centerIndex) * totalCardSpace + xOffset;
        const distance = Math.abs(baseX);
        const maxDistance = totalCardSpace * 2.2;
        const scale = Math.max(0.6, 1 - (distance / maxDistance) * 0.5);
        const zTranslate = -distance * 0.6;
        const rotateY = (baseX / (totalCardSpace * 2)) * 20;
        const opacity = Math.max(0.25, 1 - distance / (maxDistance * 1.1));

        // Depth blur (soft)
        const blurAmount = Math.min(distance / 150, 3);
        card.style.filter = `blur(${blurAmount}px)`;

        card.style.transform = `
          translateX(${baseX}px)
          translateZ(${zTranslate}px)
          rotateY(${rotateY}deg)
          scale(${scale})
        `;
        card.style.opacity = opacity;
        card.style.zIndex = Math.round(100 - distance);

        // Highlight active card
        if (index === activeIndex) {
          card.classList.add('active');
        } else {
          card.classList.remove('active');
        }

        // Per‑card shine: compute cursor position relative to card center (screen space)
        const cardRect = card.getBoundingClientRect();
        const cardCenterX = cardRect.left + cardRect.width / 2;
        const cardCenterY = cardRect.top + cardRect.height / 2;
        const relX = ((mouseScreenX - cardCenterX) / cardRect.width) * 100 + 50;  // 0-100%
        const relY = ((mouseScreenY - cardCenterY) / cardRect.height) * 100 + 50;
        card.style.setProperty('--shine-x', `${relX}%`);
        card.style.setProperty('--shine-y', `${relY}%`);

        // Add shine class only to cards that are reasonably close to the cursor
        const distToCursor = Math.hypot(mouseScreenX - cardCenterX, mouseScreenY - cardCenterY);
        if (distToCursor < 200 && distance < totalCardSpace * 1.5) {
          card.classList.add('shine');
        } else {
          card.classList.remove('shine');
        }
      });

      // Update progress dots
      dots.forEach((dot, i) => {
        dot.classList.toggle('active', i === activeIndex);
      });
    }

    // ────────────────────────────────── CAROUSEL TILT (3D) ───────────────────
    function updateCarouselTilt() {
      const tiltX = ((mouseScreenY / window.innerHeight) - 0.5) * -12; // vertical tilt
      const tiltY = ((mouseScreenX / window.innerWidth) - 0.5) * 18;   // horizontal tilt
      carousel.style.transform = `translate(-50%, -50%) rotateX(${tiltX}deg) rotateY(${tiltY}deg)`;
    }

    // ────────────────────────────────── GLOBAL GLARE ─────────────────────────
    function updateGlobalGlare() {
      const x = (mouseScreenX / window.innerWidth) * 100;
      const y = (mouseScreenY / window.innerHeight) * 100;
      glare.style.background = `radial-gradient(circle at ${x}% ${y}%, rgba(255,255,255,0.15) 0%, transparent 65%)`;
    }

    // ────────────────────────────────── ANIMATION LOOP ───────────────────────
    function animate(time) {
      // Track idle for auto‑play
      if (!isDragging) {
        idleTime += 16; // approx per frame
      }

      // Auto‑advance when idle long enough
      if (!isDragging && idleTime > autoAdvanceDelay) {
        // Determine target next card without skipping abruptly
        const currentSnapped = Math.round(targetOffset / totalCardSpace) * totalCardSpace;
        const nextOffset = currentSnapped + autoPlayDirection * totalCardSpace;
        // Wrap if needed (optional infinite scroll)
        targetOffset = nextOffset;
        idleTime = 0; // reset timer so it doesn't snap immediately again
        // Reverse direction at edges for a boomerang effect
        const maxOffset = (cardCount - 1 - centerIndex) * totalCardSpace;
        const minOffset = -(centerIndex) * totalCardSpace;
        if (targetOffset > maxOffset) {
          targetOffset = minOffset;
        } else if (targetOffset < minOffset) {
          targetOffset = maxOffset;
        }
      }

      // Physics: when not dragging, smoothly interpolate xOffset toward targetOffset
      if (!isDragging) {
        const diff = targetOffset - xOffset;
        if (Math.abs(diff) > 0.1) {
          // Use spring‑like but with critical damping for smoothness
          velocity += diff * springStiffness;
          velocity *= springDamping;
          xOffset += velocity;
        } else {
          xOffset = targetOffset;
          velocity = 0;
        }
      } else {
        // while dragging, targetOffset = xOffset (already set in move)
      }

      updateCards();
      updateCarouselTilt();
      updateGlobalGlare();

      requestAnimationFrame(animate);
    }

    // ────────────────────────────────── PARTICLES (CONSTELLATION) ────────────
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let width, height;
    let particles = [];

    function resizeCanvas() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
      initParticles();
    }
    window.addEventListener('resize', resizeCanvas);

    function initParticles() {
      particles = [];
      const count = 120;
      for (let i = 0; i < count; i++) {
        particles.push({
          x: Math.random() * width,
          y: Math.random() * height,
          vx: (Math.random() - 0.5) * 0.35,
          vy: (Math.random() - 0.5) * 0.35,
          radius: Math.random() * 2 + 1,
          color: `hsl(${260 + Math.random() * 40}, 80%, 70%)`,
        });
      }
    }

    function drawParticles() {
      ctx.clearRect(0, 0, width, height);
      // Update positions
      for (let p of particles) {
        p.x += p.vx;
        p.y += p.vy;
        if (p.x < 0) p.x = width;
        if (p.x > width) p.x = 0;
        if (p.y < 0) p.y = height;
        if (p.y > height) p.y = 0;
      }

      // Draw connections (constellation)
      const threshold = 100;
      ctx.beginPath();
      ctx.strokeStyle = 'rgba(167, 139, 250, 0.12)';
      ctx.lineWidth = 0.5;
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < threshold) {
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
          }
        }
      }
      ctx.stroke();

      // Draw particles
      for (let p of particles) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 12;
        ctx.fill();
      }
      ctx.shadowBlur = 0;
      requestAnimationFrame(drawParticles);
    }

    // ────────────────────────────────── START ────────────────────────────────
    resizeCanvas();
    drawParticles();
    requestAnimationFrame(animate);

    // Show glare on move
    window.addEventListener('pointermove', () => {
      glare.style.opacity = '1';
    });
    window.addEventListener('pointerleave', () => {
      glare.style.opacity = '0';
    });
  </script>
</body>
</html>
